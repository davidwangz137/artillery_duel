<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artillery Duel</title>
  <script>
    // Surface any client-side runtime error on-screen (the game runs in the
    // browser, so server logs can't see freezes). Without this a thrown error
    // just silently kills the render loop.
    window.addEventListener('error', (e) => showError((e.error && e.error.stack) || e.message));
    window.addEventListener('unhandledrejection', (e) =>
      showError('Promise: ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason))
    );
    function showError(msg) {
      let b = document.getElementById('__err');
      if (!b) {
        b = document.createElement('div');
        b.id = '__err';
        b.style.cssText =
          'position:fixed;left:8px;bottom:8px;max-width:62vw;max-height:46vh;overflow:auto;' +
          'background:#7a1a1a;color:#ffe;border:1px solid #f88;font:12px/1.4 monospace;' +
          'padding:8px 10px;z-index:9999;white-space:pre-wrap;border-radius:4px';
        document.body.appendChild(b);
      }
      b.textContent += msg + '\n\n';
    }
  </script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #9fd3ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #game { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
    }
    .help {
      position: absolute;
      top: 10px; left: 12px;
      font-size: 13px;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }
    .bars {
      position: absolute;
      top: 10px; right: 12px;
      width: 220px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .bar-label { width: 52px; }
    .bar-track {
      flex: 1;
      height: 12px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 6px;
      transition: width 0.12s linear;
    }
    .bar-hp { width: 64px; font-variant-numeric: tabular-nums; }
    .stats {
      position: absolute;
      top: 40px; right: 12px;
      width: 220px;
      text-align: right;
      font-size: 14px;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      opacity: 0.95;
    }
    .buffs {
      position: absolute;
      top: 62px; right: 12px;
      width: 220px;
      text-align: right;
      font-size: 12px;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
      opacity: 0.9;
    }
    .status {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.45);
    }
    .overlay.hidden { display: none; }
    .overlay-title { font-size: 48px; font-weight: 800; letter-spacing: 0.08em; }
    .overlay-score { font-size: 20px; opacity: 0.95; font-variant-numeric: tabular-nums; }
    .overlay-controls { font-size: 15px; opacity: 0.8; letter-spacing: 0.03em; }
    .overlay-hint { font-size: 15px; opacity: 0.8; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
